<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTT & 맛집 지도</title>
    <style>
        /* main.html 감성의 다크 테마 배경 */
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0b0b13 0%, #1a1a2e 100%);
            color: #ffffff;
            font-family: 'Pretendard', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .main-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* 1. 지도 영역 (좌측 꽉 차게) */
        .map-wrapper {
            flex: 1;
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        #map {
            flex: 1;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* 2. 우측 세부 카테고리 사이드바 */
        .category-sidebar {
            width: 300px;
            /* 검색창이 여유롭게 들어가도록 너비를 살짝 넓혔습니다 */
            background: rgba(15, 15, 25, 0.95);
            border-left: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            box-shadow: -5px 0 20px rgba(0, 0, 0, 0.5);
            overflow-y: auto;
            /* 메뉴가 많아지면 스크롤 가능하도록 추가 */
        }

        /* 3. 검색창 UI (사이드바 내부로 이동 및 정렬) */
        .search-box {
            display: flex;
            flex-direction: column;
            /* 입력창과 버튼을 위아래로 배치 */
            gap: 10px;
            background: rgba(30, 30, 45, 0.6);
            padding: 15px;
            border-radius: 12px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 30px;
            /* 아래 메뉴 카테고리와의 간격 */
        }

        .search-box input {
            background: rgba(0, 0, 0, 0.3);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            outline: none;
            padding: 10px 12px;
            font-size: 14px;
            border-radius: 8px;
            width: 100%;
            box-sizing: border-box;
            transition: 0.3s;
        }

        .search-box input:focus {
            border-color: #6c5ce7;
        }

        .search-box input::placeholder {
            color: #aaa;
        }

        .search-box .btn-group {
            display: flex;
            gap: 8px;
            /* 버튼 사이 간격 */
        }

        .search-box button {
            flex: 1;
            /* 두 버튼이 정확히 반반씩 차지하도록 설정 */
            background: #6c5ce7;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        .search-box button:hover {
            background: #5b4bc4;
        }

        #cancelBtn {
            background-color: #ff7675;
        }

        #cancelBtn:hover {
            background-color: #d63031;
        }

        /* 4. 카테고리 메뉴 스타일 */
        .category-sidebar h3 {
            margin-top: 0;
            font-size: 1.3rem;
            color: #a29bfe;
            border-bottom: 2px solid #6c5ce7;
            padding-bottom: 12px;
            margin-bottom: 20px;
        }

        .category-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .category-btn {
            background: rgba(255, 255, 255, 0.05);
            color: #ddd;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            text-align: left;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-btn:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #6c5ce7;
            color: #fff;
            transform: translateX(5px);
        }

        .category-btn.active {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.4);
        }

        /* 5. 내 위치 버튼 */
        #myLocationBtn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            z-index: 10;
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px;
            border-radius: 50%;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            cursor: pointer;
            font-size: 20px;
            transition: 0.3s;
        }

        #myLocationBtn:hover {
            background: #6c5ce7;
            border-color: #6c5ce7;
        }
    </style>
</head>

<body>
    <div class="main-container">
        <div class="map-wrapper">
            <div id="map"></div>
            <button id="myLocationBtn">🔄</button>
        </div>

        <div class="category-sidebar">

            <div class="search-box">
                <input type="text" id="keyword" placeholder="식당이나 음식 검색">
                <div class="btn-group">
                    <button id="searchBtn">검색</button>
                    <button id="cancelBtn">취소</button>
                </div>
            </div>

            <h3>🍽️ 메뉴 카테고리</h3>
            <div class="category-grid">
                <button class="category-btn" data-keyword="전체">🌍 전체</button>
                <button class="category-btn" data-keyword="한식">🍚 한식</button>
                <button class="category-btn" data-keyword="일식">🍣 일식</button>
                <button class="category-btn" data-keyword="양식">🍝 양식</button>
                <button class="category-btn" data-keyword="중식">🥢 중식</button>
                <button class="category-btn" data-keyword="분식">🥟 분식</button>
                <button class="category-btn" data-keyword="패스트푸드">🍔 패스트푸드</button>
                <button class="category-btn" data-keyword="치킨">🍗 치킨</button>
                <button class="category-btn" data-keyword="카페">☕ 카페</button>
            </div>
        </div>
    </div>
    <script type="text/javascript"
        src="//dapi.kakao.com/v2/maps/sdk.js?appkey=4078cd5d7f89a4a3b866799c8c50b8fc&libraries=services"></script>
    <script type="module" src="map.js"></script>
</body>

</html>
