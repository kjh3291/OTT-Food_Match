<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주변 맛집 찾기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
        }

        /* 💡 지도를 감싸는 부모 영역 (이 안에서 요소를 자유롭게 배치 가능) */
        .map-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            margin-top: 20px;
        }

        /* 💡 실제 지도가 렌더링되는 영역 (부모 영역의 크기를 100% 채움) */
        #map {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        /* 💡 검색창 영역 (우측 상단에 띄우기) */
        .search-box {
            position: absolute;
            top: 15px;
            /* 위에서부터 15px 띄움 */
            right: 15px;
            /* 오른쪽에서부터 15px 띄움 */
            z-index: 10;
            /* 지도(보통 1~2)보다 위에 보이도록 z-index를 높게 설정 */
            display: flex;
            gap: 8px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            /* 살짝 그림자를 주어 입체감 부여 */
        }

        .search-box input {
            width: 180px;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }

        .search-box button {
            padding: 8px 15px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        .search-box button:hover {
            background-color: #45a049;
        }
    </style>
</head>

<body>
    <h2>📍 내 주변 음식점 지도</h2>
    <p>현재 위치를 기반으로 주변 식당을 검색합니다.</p>

    <div class="map-wrapper">

        <div class="search-box">
            <input type="text" id="keyword" placeholder="예: 강남역 치킨">
            <button id="searchBtn">검색</button>
            <button id="cancelBtn">취소</button>
        </div>

        <div id="map"></div>

    </div>

    <script type="text/javascript"
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4078cd5d7f89a4a3b866799c8c50b8fc&libraries=services"></script>

    <script src="config.js"></script>
    <script src="map.js"></script>
</body>

</html>
