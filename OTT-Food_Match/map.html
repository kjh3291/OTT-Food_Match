<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 주변 맛집 찾기</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
        }

        #map {
            width: 100%;
            height: 500px;
            margin-top: 20px;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        .info-title {
            padding: 5px;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>

<body>
    <h2>📍 내 주변 음식점 지도</h2>
    <p>현재 위치를 기반으로 주변 식당을 검색합니다.</p>
    <div style="margin-bottom: 15px; display: flex; gap: 10px;">
        <input type="text" id="keyword" placeholder="예: 강남역 치킨, 홍콩반점"
            style="flex-grow: 1; padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px;">
        <button id="searchBtn"
            style="padding: 10px 20px; background-color: #4CAF50; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer;">
            식당 검색
        </button>
    </div>

    <div id="map"></div>

    <div id="map"></div>

    <script type="text/javascript"
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4078cd5d7f89a4a3b866799c8c50b8fc&libraries=services"></script>

    <script src="config.js"></script>
    <script src="map.js"></script>
</body>

</html>
