<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> FOOTT </title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            padding: 20px;
        }

        /* 지도를 감싸는 부모 영역 (이 안에서 요소를 자유롭게 배치 가능) */
        .map-wrapper {
            position: relative;
            width: 100%;
            height: 500px;
            margin-top: 20px;
        }

        /* 실제 지도가 렌더링되는 영역 */
        #map {
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        /* 검색창 영역 */
        .search-box {
            position: absolute;
            top: 15px;
            right: 15px;
            z-index: 10;
            display: flex;
            gap: 8px;
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
        }

        .search-box input {
            width: 180px;
            padding: 8px 12px;
            border-radius: 5px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }

        /* 검색 버튼 스타일 */
        .search-box button {
            padding: 8px 15px;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }

        #searchBtn {
            background-color: #4CAF50;
        }

        #searchBtn:hover {
            background-color: #45a049;
        }

        /* 취소 버튼은 빨간색 계열로 직관성 부여 */
        #cancelBtn {
            background-color: #f44336;
        }

        #cancelBtn:hover {
            background-color: #d32f2f;
        }

        /* 💡 새롭게 추가된 '내 위치' 버튼 스타일 */
        #myLocationBtn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            z-index: 10;
            /* 지도 위에 뜨도록 설정 */
            width: 45px;
            height: 45px;
            background-color: white;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #myLocationBtn:hover {
            background-color: #f0f0f0;
        }
    </style>
</head>

<body>
    <div class="map-wrapper">
        <div class="search-box">
            <input type="text" id="keyword" placeholder="예: 강남역 치킨">
            <button id="searchBtn">검색</button>
            <button id="cancelBtn">취소</button>
        </div>

        <div id="map"></div>

        <button id="myLocationBtn" title="내 위치로 이동">🎯</button>
    </div>

    <script type="text/javascript"
        src="https://dapi.kakao.com/v2/maps/sdk.js?appkey=4078cd5d7f89a4a3b866799c8c50b8fc&libraries=services"></script>

    <script src="config.js"></script>
    <script src="map.js"></script>
</body>


</html>
