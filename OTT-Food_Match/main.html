<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTT 푸드 매칭 추천</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>🍿 뭐 볼까, 뭐 먹을까</h1>
        <p>OTT와 음식 조합을 한 번에 추천해주는 서비스</p>
      </header>

      <main>
        <section class="card">
          <h2>1. OTT 선택</h2>
          <div class="option-group" id="ottOptions">
            <button class="option-btn" data-type="ott" data-value="넷플릭스">넷플릭스</button>
            <button class="option-btn" data-type="ott" data-value="디즈니+">디즈니+</button>
            <button class="option-btn" data-type="ott" data-value="티빙">티빙</button>
            <button class="option-btn" data-type="ott" data-value="웨이브">웨이브</button>
          </div>
        </section>

        <section class="card">
          <h2>2. 분위기 선택</h2>
          <div class="option-group" id="moodOptions">
            <button class="option-btn" data-type="mood" data-value="가볍게">가볍게</button>
            <button class="option-btn" data-type="mood" data-value="몰입감">몰입감</button>
            <button class="option-btn" data-type="mood" data-value="웃긴">웃긴</button>
            <button class="option-btn" data-type="mood" data-value="로맨틱">로맨틱</button>
            <button class="option-btn" data-type="mood" data-value="스릴">스릴</button>
            <button class="option-btn" data-type="mood" data-value="감성">감성</button>
          </div>
        </section>

        <section class="card">
          <h2>3. 식사 상황 선택</h2>
          <div class="option-group" id="mealOptions">
            <button class="option-btn" data-type="meal" data-value="혼밥">혼밥</button>
            <button class="option-btn" data-type="meal" data-value="야식">야식</button>
            <button class="option-btn" data-type="meal" data-value="친구와 함께">친구와 함께</button>
            <button class="option-btn" data-type="meal" data-value="연인과 함께">연인과 함께</button>
            <button class="option-btn" data-type="meal" data-value="간단한 식사">간단한 식사</button>
            <button class="option-btn" data-type="meal" data-value="든든한 식사">든든한 식사</button>
          </div>
        </section>

        <div class="action-area">
          <button id="recommendBtn" class="primary-btn">추천 받기</button>
          <button id="resetBtn" class="secondary-btn">초기화</button>
        </div>

        <section id="resultSection" class="result-section hidden">
          <h2>추천 결과</h2>

          <div class="result-card">
            <h3>🎬 추천 콘텐츠</h3>
            <div id="contentResult"></div>
          </div>

          <div class="result-card">
            <h3>🍕 추천 음식</h3>
            <div id="foodResult"></div>
          </div>

          <div class="result-card best-match">
            <h3>✨ Best Match Combo</h3>
            <p id="bestMatchText"></p>
          </div>
          
          <div class="action-area" style="margin-top: 16px;">
            <button id="shareBtn" class="secondary-btn" style="width: 100%;">결과 공유하기 🔗</button>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
