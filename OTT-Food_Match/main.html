<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTT 푸드 매칭 추천</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <div class="setting-area">
          <button id="settingBtn" class="setting-btn">⚙ 설정</button>
          <div id="settingPopup" class="setting-popup hidden">
            <h3 id="settingTitle">설정</h3>
            <button id="darkModeToggle" class="setting-option-btn">🌙 다크 모드</button>
            <button id="langMenuBtn" class="setting-option-btn">🌐 언어 설정</button>
          </div>
        </div>

        <h1 id="mainTitle">🍿 뭐 볼까, 뭐 먹을까</h1>
        <p id="mainDesc">OTT와 음식 조합을 한 번에 추천해주는 서비스</p>
        
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </header>

      <main id="wizardForm">
        <section class="card step-section active" id="step1">
          <h2 id="step1Title">1. 어떤 것을 먼저 고르시겠어요?</h2>
          <div class="option-group vertical-group">
            <button id="step1Opt1" class="option-btn big-btn" data-step="1" data-key="primary" data-value="ott">📺 볼 콘텐츠(OTT) 기준</button>
            <button id="step1Opt2" class="option-btn big-btn" data-step="1" data-key="primary" data-value="food">🍕 먹을 음식 메뉴 기준</button>
          </div>
        </section>

        <section class="card step-section hidden" id="step2">
          <h2 id="step2Title">2. 현재 식사 상황은 어떠신가요?</h2>
          <div class="option-group">
            <button id="meal_honbab" class="option-btn" data-step="2" data-key="situation" data-value="혼밥">혼밥</button>
            <button id="meal_yasik" class="option-btn" data-step="2" data-key="situation" data-value="야식">야식</button>
            <button id="meal_friends" class="option-btn" data-step="2" data-key="situation" data-value="친구와 함께">친구와 함께</button>
            <button id="meal_couple" class="option-btn" data-step="2" data-key="situation" data-value="연인과 함께">연인과 함께</button>
            <button id="meal_light" class="option-btn" data-step="2" data-key="situation" data-value="간단한 식사">간단한 식사</button>
            <button id="meal_heavy" class="option-btn" data-step="2" data-key="situation" data-value="든든한 식사">든든한 식사</button>
          </div>
        </section>

        <section class="card step-section hidden" id="step3-ott">
          <h2 id="step3OttTitle">3. 이용 중인 OTT 플랫폼을 알려주세요.</h2>
          <div class="ott-logo-grid">
            <button class="option-btn ott-logo-card" data-step="3" data-key="detail" data-value="넷플릭스">
              <img src="images/netflix.png" alt="넷플릭스" class="ott-icon-img"><span>Netflix</span>
            </button>
            <button class="option-btn ott-logo-card" data-step="3" data-key="detail" data-value="디즈니+">
              <img src="images/disney.png" alt="디즈니 플러스" class="ott-icon-img"><span>Disney+</span>
            </button>
            <button class="option-btn ott-logo-card" data-step="3" data-key="detail" data-value="티빙">
              <img src="images/tving.png" alt="티빙" class="ott-icon-img"><span>TVING</span>
            </button>
            <button class="option-btn ott-logo-card" data-step="3" data-key="detail" data-value="웨이브">
              <img src="images/wavve.png" alt="웨이브" class="ott-icon-img"><span>wavve</span>
            </button>
          </div>
        </section>

        <section class="card step-section hidden" id="step3-food">
          <h2 id="step3FoodTitle">3. 어떤 종류의 음식이 끌리시나요?</h2>
          <div class="option-group">
            <button id="food_chicken_pizza" class="option-btn" data-step="3" data-key="detail" data-value="치킨/피자">치킨/피자</button>
            <button id="food_bunsik" class="option-btn" data-step="3" data-key="detail" data-value="분식(떡볶이 등)">분식(떡볶이 등)</button>
            <button id="food_korean" class="option-btn" data-step="3" data-key="detail" data-value="한식(국밥/찌개)">한식(국밥/찌개)</button>
            <button id="food_western" class="option-btn" data-step="3" data-key="detail" data-value="양식(파스타 등)">양식(파스타 등)</button>
          </div>
        </section>

        <section class="card step-section hidden" id="step4-ott">
          <h2 id="step4OttTitle">4. 이용 중인 OTT 플랫폼을 알려주세요.</h2>
          <div class="ott-logo-grid">
            <button class="option-btn ott-logo-card" data-step="4" data-key="selectedOtt" data-value="넷플릭스">
              <img src="images/netflix.png" alt="넷플릭스" class="ott-icon-img"><span>Netflix</span>
            </button>
            <button class="option-btn ott-logo-card" data-step="4" data-key="selectedOtt" data-value="디즈니+">
              <img src="images/disney.png" alt="디즈니 플러스" class="ott-icon-img"><span>Disney+</span>
            </button>
            <button class="option-btn ott-logo-card" data-step="4" data-key="selectedOtt" data-value="티빙">
              <img src="images/tving.png" alt="티빙" class="ott-icon-img"><span>TVING</span>
            </button>
            <button class="option-btn ott-logo-card" data-step="4" data-key="selectedOtt" data-value="웨이브">
              <img src="images/wavve.png" alt="웨이브" class="ott-icon-img"><span>wavve</span>
            </button>
          </div>
        </section>

        <div class="action-area hidden" id="navArea">
          <button id="prevBtn" class="secondary-btn">이전 단계</button>
          <button id="nextBtn" class="primary-btn">다음 단계</button>
        </div>

        <section id="loadingSection" class="result-section hidden" style="text-align: center; padding: 40px 0;">
          <div class="spinner"></div>
          <h3 id="loadingTitle" style="margin-top: 15px; color: #ff7a59;">맞춤 조합을 찾는 중입니다...</h3>
          <p id="loadingDesc" style="color: #666; font-size: 0.9rem;">잠시만 기다려주세요 🍿</p>
        </section>

        <section id="resultSection" class="result-section hidden">
          <h2 id="resultTitle">✨ 맞춤 추천 결과 ✨</h2>
          <div class="result-card">
            <h3 id="resContentTitle">🎬 추천 콘텐츠</h3>
            <div id="contentResult"></div>
          </div>
          <div class="result-card">
            <h3 id="resFoodTitle">🍕 추천 음식</h3>
            <div id="foodResult"></div>
          </div>
          <div class="result-card best-match">
            <h3 id="resComboTitle">💡 Best Match Combo</h3>
            <p id="bestMatchText"></p>
          </div>
          <div class="action-area" style="flex-direction: column; gap: 8px; margin-top: 16px;">
            <button id="shareBtn" class="primary-btn" style="width: 100%;">결과 공유하기 🔗</button>
            <button id="resetBtn" class="secondary-btn" style="width: 100%;">처음부터 다시하기</button>
          </div>
        </section>
      </main>
    </div>

    <div id="langModal" class="modal-overlay">
      <div class="modal-content">
        <h3 id="langModalTitle" style="margin-bottom: 10px;">언어 설정</h3>
        <div class="lang-options">
          <button class="lang-select-btn" data-lang="ko">🇰🇷 한국어</button>
          <button class="lang-select-btn" data-lang="en">🇺🇸 English</button>
        </div>
        <button id="closeLangModal" class="secondary-btn" style="margin-top: 20px; width: 100%; border-radius: 12px;">닫기</button>
      </div>
    </div>

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="i18n.js"></script>
    <script src="script.js"></script>
  </body>
</html>
