<section id="loadingSection" class="result-section hidden" style="text-align: center; padding: 40px 0;">
  <div class="spinner"></div>
  <h3 style="margin-top: 15px; color: #ff7a59;">맞춤 조합을 찾는 중입니다...</h3>
  <p style="color: #666; font-size: 0.9rem;">잠시만 기다려주세요 🍿</p>
</section>

<section id="resultSection" class="result-section hidden">


<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OTT 푸드 매칭 추천</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1>🍿 뭐 볼까, 뭐 먹을까</h1>
        <p>OTT와 음식 조합을 한 번에 추천해주는 서비스</p>
        
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </header>

      <main id="wizardForm">
        <section class="card step-section active" id="step1">
          <h2>1. 어떤 것을 먼저 고르시겠어요?</h2>
          <div class="option-group vertical-group">
            <button class="option-btn big-btn" data-step="1" data-key="primary" data-value="ott">
              📺 볼 콘텐츠(OTT) 기준
            </button>
            <button class="option-btn big-btn" data-step="1" data-key="primary" data-value="food">
              🍕 먹을 음식 메뉴 기준
            </button>
          </div>
        </section>

        <section class="card step-section hidden" id="step2">
          <h2>2. 현재 식사 상황은 어떠신가요?</h2>
          <div class="option-group">
            <button class="option-btn" data-step="2" data-key="situation" data-value="혼밥">혼밥</button>
            <button class="option-btn" data-step="2" data-key="situation" data-value="야식">야식</button>
            <button class="option-btn" data-step="2" data-key="situation" data-value="친구와 함께">친구와 함께</button>
            <button class="option-btn" data-step="2" data-key="situation" data-value="연인과 함께">연인과 함께</button>
            <button class="option-btn" data-step="2" data-key="situation" data-value="간단한 식사">간단한 식사</button>
            <button class="option-btn" data-step="2" data-key="situation" data-value="든든한 식사">든든한 식사</button>
          </div>
        </section>

        <section class="card step-section hidden" id="step3-ott">
          <h2>3. 이용 중인 OTT 플랫폼을 알려주세요.</h2>
          <div class="option-group">
            <button class="option-btn" data-step="3" data-key="detail" data-value="넷플릭스">넷플릭스</button>
            <button class="option-btn" data-step="3" data-key="detail" data-value="디즈니+">디즈니+</button>
            <button class="option-btn" data-step="3" data-key="detail" data-value="티빙">티빙</button>
            <button class="option-btn" data-step="3" data-key="detail" data-value="웨이브">웨이브</button>
          </div>
        </section>

        <section class="card step-section hidden" id="step3-food">
          <h2>3. 어떤 종류의 음식이 끌리시나요?</h2>
          <div class="option-group">
            <button class="option-btn" data-step="3" data-key="detail" data-value="치킨/피자">치킨/피자</button>
            <button class="option-btn" data-step="3" data-key="detail" data-value="분식(떡볶이 등)">분식(떡볶이 등)</button>
            <button class="option-btn" data-step="3" data-key="detail" data-value="한식(국밥/찌개)">한식(국밥/찌개)</button>
            <button class="option-btn" data-step="3" data-key="detail" data-value="양식(파스타 등)">양식(파스타 등)</button>
          </div>
        </section>

        <div class="action-area hidden" id="navArea">
          <button id="prevBtn" class="secondary-btn">이전 단계</button>
          <button id="nextBtn" class="primary-btn">다음 단계</button>
        </div>

        <section id="resultSection" class="result-section hidden">
          <h2>✨ 맞춤 추천 결과 ✨</h2>

          <div class="result-card">
            <h3>🎬 추천 콘텐츠</h3>
            <div id="contentResult"></div>
          </div>

          <div class="result-card">
            <h3>🍕 추천 음식</h3>
            <div id="foodResult"></div>
          </div>

          <div class="result-card best-match">
            <h3>💡 Best Match Combo</h3>
            <p id="bestMatchText"></p>
          </div>
          
          <div class="action-area" style="flex-direction: column; gap: 8px; margin-top: 16px;">
            <button id="shareBtn" class="primary-btn" style="width: 100%;">결과 공유하기 🔗</button>
            <button id="resetBtn" class="secondary-btn" style="width: 100%;">처음부터 다시하기</button>
          </div>
        </section>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
