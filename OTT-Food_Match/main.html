<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OTT 푸드 매칭 추천</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <h1>🍿 뭐 볼까, 뭐 먹을까</h1>
      <p>OTT와 음식 조합을 한 번에 추천해주는 서비스</p>
    </header>

    <main>
  <section class="card">
  <h2>1. OTT 선택</h2>
  <p style="margin-bottom: 14px; color: #666;">
    보고 싶은 OTT를 선택해주세요.
  </p>

  <div class="ott-logo-grid" id="ottOptions">
    <button class="ott-logo-card" data-value="티빙">
      <img src="images/tving.png" alt="티빙 아이콘" class="ott-icon-img">
      <span>TVING</span>
    </button>

    <button class="ott-logo-card" data-value="디즈니+">
      <img src="images/disney.png" alt="디즈니 플러스 아이콘" class="ott-icon-img">
      <span>Disney+</span>
    </button>

    <button class="ott-logo-card" data-value="넷플릭스">
      <img src="images/netflix.png" alt="넷플릭스 아이콘" class="ott-icon-img">
      <span>Netflix</span>
    </button>

    <button class="ott-logo-card" data-value="웨이브">
      <img src="images/wavve.png" alt="웨이브 아이콘" class="ott-icon-img">
      <span>wavve</span>
    </button>
  </div>
</section>

      <script src="script.js"></script>
</body>

</html>
