<!doctype html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>식사 상황 선택</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <div class="app">
    <header class="header">
      <h1 id="ottTitle">식사 상황 선택</h1>
      <p>어떤 상황에서 영화를 볼 예정인지 선택해주세요.</p>
    </header>

    <main>
      <section class="card">
        <h2>2. 식사 상황 선택</h2>
        <p style="margin-bottom: 12px; color: #666;">
          선택한 상황에 따라 영화에 어울리는 음식 추천이 달라집니다.
        </p>

        <div class="option-group" id="mealOptions">
          <button class="option-btn" data-type="meal" data-value="혼밥">혼밥</button>
          <button class="option-btn" data-type="meal" data-value="야식">야식</button>
          <button class="option-btn" data-type="meal" data-value="친구와 함께">친구와 함께</button>
          <button class="option-btn" data-type="meal" data-value="연인과 함께">연인과 함께</button>
          <button class="option-btn" data-type="meal" data-value="간단한 식사">간단한 식사</button>
          <button class="option-btn" data-type="meal" data-value="든든한 식사">든든한 식사</button>
        </div>
      </section>

      <div class="action-area">
        <button id="goMovieBtn" class="primary-btn">
          영화 보러가기
        </button>

        <button id="backBtn" class="secondary-btn">
          메인으로 돌아가기
        </button>
      </div>
    </main>
  </div>

  <script src="ott.js"></script>
</body>

</html>
